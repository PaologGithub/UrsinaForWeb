<!DOCTYPE html>
<html lang=en-us>

<head>
    <meta charset=utf-8>
    <meta content="text/html; charset=utf-8" http-equiv=Content-Type>
    <title>{{TITLE}}</title>
    <link rel="shortcut icon" href="{{LOGO}}" type="image/png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background: #000;
            z-index: 0;
            cursor: default;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
        }

        #logo {
            position: absolute;
            left: 50%;
            top: 25vh;
            transform: translate(-50%, -50%);
        }

        #center-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            height: 30px;
            width: 30px;
            margin: 0 0 15px 0;
            animation: rotation .8s linear infinite;
            border-top: 5px solid #0083ff;
            border-radius: 100%;
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #status {
            font-weight: 700;
            color: #787878;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <img id="logo" src="{{LOGO}}" alt="Game logo">

        <div id="center-ui">
            <div class="spinner" id="spinner"></div>
            <div id="status">Downloading...</div>
            <progress hidden id="progress" max="100" value="0"></progress>
        </div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script> /* Required. Do not remove. */
        var statusElement = document.getElementById("status"),
            progressElement = document.getElementById("progress"),
            spinnerElement = document.getElementById("spinner"),
            Module = {
                preRun: [],
                postRun: [function () {
                    const overlay = document.getElementById("overlay");
                    if (overlay) overlay.style.display = "none";
                }],
                print: function() {
                    var e = document.getElementById("output");
                    return e && (e.value = ""),
                        function(t) {
                            arguments.length > 1 && (t = Array.prototype.slice.call(arguments).join(" ")), console.log(t), e && (e.value += t + "\n", e.scrollTop = e.scrollHeight)
                        }
                }(),
                printErr: function(e) {
                    arguments.length > 1 && (e = Array.prototype.slice.call(arguments).join(" ")), console.error(e)
                },
                canvas: function() {
                    var canvas = document.getElementById('canvas');
                    canvas.contentEditable = true;
                    canvas.setAttribute("tabindex", "0");
                    // Focus the canvas when the mouse enters it.
                    canvas.addEventListener('mouseenter',function() {canvas.focus();},false);
                    return canvas;
                }(),
                setStatus: function(e) {
                    if(Module.setStatus.last || (Module.setStatus.last = {
                            time: Date.now(),
                            text: ""
                        }), e !== Module.setStatus.last.text) {
                        var t = e.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/),
                            n = Date.now();
                        t && n - Module.setStatus.last.time < 30 || (Module.setStatus.last.time = n, Module.setStatus.last.text = e, t ? (e = t[1], progressElement.value = 100 * parseInt(t[2]), progressElement.max = 100 * parseInt(t[4]), progressElement.hidden = !1, spinnerElement.hidden = !1) : (progressElement.value = null, progressElement.max = null, progressElement.hidden = !0, e || (spinnerElement.style.display = "none")), statusElement.innerHTML = e)
                    }
                },
                totalDependencies: 0,
                monitorRunDependencies: function(e) {
                    this.totalDependencies = Math.max(this.totalDependencies, e), Module.setStatus(e ? "Preparing... (" + (this.totalDependencies - e) + "/" + this.totalDependencies + ")" : "All downloads complete.")
                }
            };
        Module.setStatus("Downloading..."), window.onerror = function(e) {
            Module.setStatus("Exception thrown, see JavaScript console"), spinnerElement.style.display = "none", Module.setStatus = function(e) {
                e && Module.printErr("[post-exception status] " + e)
            }
        }
    </script>
    <script> /* Not required for running the game, remove functionnalities as you wish. */
        function setupCanvasSize() {
            const canvas = document.getElementById("canvas");
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        }
        window.addEventListener("load", setupCanvasSize);
        window.addEventListener("resize", setupCanvasSize);

        /*window.addEventListener("click", async () => {
            const canvas = document.getElementById("canvas");
            await canvas.requestFullscreen();
            await canvas.requestPointerLock();
        });*/

    </script>
    <script async src="game.js"></script>
</body>

</html>
